name: BrewDeck API CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  api-quality-checks:
    name: API Quality Checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: brewdeck
          POSTGRES_USER: brewdeck
          POSTGRES_PASSWORD: brewdeck
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U brewdeck -d brewdeck"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: brewdeck-api

    env:
      SPRING_PROFILES_ACTIVE: test
      DB_URL: jdbc:postgresql://localhost:5432/brewdeck
      DB_USER: brewdeck
      DB_PASSWORD: brewdeck

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Run Spotless check
        run: ./mvnw spotless:check

      - name: Run tests
        run: ./mvnw test

      - name: Run PMD
        run: ./mvnw pmd:check

      - name: Run OWASP Dependency Check
        run: ./mvnw dependency-check:check

      - name: Package application
        run: ./mvnw clean package -DskipTests

      - name: Upload OWASP report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: brewdeck-api/target/dependency-check-report.html