name: BrewDeck API CI

on:
  push:
    branches: [master, develop]
    paths:
      - "brewdeck-api/**"
      - ".github/workflows/api-ci.yml"
  pull_request:
    branches: [master, develop]
    paths:
      - "brewdeck-api/**"
      - ".github/workflows/api-ci.yml"
  workflow_dispatch:

jobs:
  api-quality-checks:
    name: API Quality Checks & SonarCloud
    runs-on: ubuntu-latest
    environment: brewdeck-github-actions

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: brewdeck
          POSTGRES_USER: brewdeck
          POSTGRES_PASSWORD: brewdeck
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U brewdeck -d brewdeck"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: brewdeck-api

    env:
      SPRING_PROFILES_ACTIVE: test
      DB_URL: jdbc:postgresql://localhost:5432/brewdeck
      DB_USER: brewdeck
      DB_PASSWORD: brewdeck

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Code Quality, Tests and SonarQube Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./mvnw -B clean spotless:check pmd:check verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=JuanMelendres_brewdeck -Dsonar.organization=juanmelendres