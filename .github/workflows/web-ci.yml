name: BrewDeck Web CI

on:
  push:
    branches: [master, develop]
    paths:
      - "brewdeck-web/**"
      - ".github/workflows/web-ci.yml"
  pull_request:
    branches: [master, develop]
    paths:
      - "brewdeck-web/**"
      - ".github/workflows/web-ci.yml"
  workflow_dispatch:

jobs:
  web-quality-checks:
    name: Web Quality Checks
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: brewdeck-web

    env:
      # Build-time public base URL; matches brewdeck-web/.env.example.
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: brewdeck-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build
