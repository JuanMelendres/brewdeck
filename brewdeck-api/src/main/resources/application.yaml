spring:
  application:
    name: brewdeck-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

  data:
    web:
      pageable:
        default-page-size: 10
        max-page-size: 100

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

brewdeck:
  ai:
    enabled: ${AI_ENABLED:false}
    model: claude-haiku-4-5
    timeout-seconds: 20
    max-tokens: 1024
  auth:
    secret: ${BREWDECK_JWT_SECRET:dev-only-insecure-secret-change-me-at-least-32-bytes}
    token-ttl: ${AUTH_TOKEN_TTL:PT24H}