spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/brewdeck}
    username: ${DB_USER:brewdeck}
    password: ${DB_PASSWORD:brewdeck}

  jpa:
    show-sql: true

logging:
  level:
    org.springframework.jdbc.datasource: DEBUG
    org.flywaydb: DEBUG
    org.hibernate.SQL: DEBUG